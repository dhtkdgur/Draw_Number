<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>번호 뽑기</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --from: #4f46e5;
      --to:   #7c3aed;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, var(--from) 0%, var(--to) 100%);
      color: #fff;
      padding: 24px 20px;
      overflow: hidden;
    }

    /* ── Floating title ── */
    .app-label {
      position: fixed;
      top: 20px;
      left: 0; right: 0;
      text-align: center;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.55);
      pointer-events: none;
    }

    /* ── Glass card ── */
    .card {
      background: rgba(255,255,255,.13);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 28px;
      padding: 44px 32px;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    /* ── States ── */
    .state { display: none; }
    .state.active { display: block; }

    /* Loading */
    .spinner {
      width: 46px; height: 46px;
      border: 4px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Idle / Ready */
    .state-icon  { font-size: 3.6rem; margin-bottom: 14px; line-height: 1; }
    .state-title { font-size: 1.45rem; font-weight: 800; margin-bottom: 6px; }
    .state-desc  { font-size: .88rem; color: rgba(255,255,255,.7); margin-bottom: 32px; line-height: 1.5; }

    /* Draw button */
    .btn-draw {
      width: 100%;
      padding: 18px 24px;
      background: #fff;
      color: var(--from);
      border: none;
      border-radius: 16px;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,.4); }
      50%      { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
    }
    .btn-draw:active  { transform: scale(.96); }
    .btn-draw:disabled {
      opacity: .55;
      cursor: not-allowed;
      animation: none;
    }

    /* Drawing (slot machine) */
    .slot-label {
      font-size: .9rem;
      font-weight: 600;
      color: rgba(255,255,255,.7);
      margin-bottom: 10px;
      letter-spacing: .06em;
    }
    .slot-number {
      font-size: clamp(80px, 28vw, 150px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -2px;
      text-shadow: 0 4px 30px rgba(0,0,0,.25);
      opacity: .75;
      animation: flicker .1s linear infinite;
    }
    @keyframes flicker {
      0%,100% { opacity: .75; }
      50%      { opacity: .6; }
    }

    /* Result */
    .result-label {
      font-size: .85rem;
      font-weight: 600;
      color: rgba(255,255,255,.7);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .result-number {
      font-size: clamp(80px, 28vw, 160px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -3px;
      text-shadow: 0 6px 32px rgba(0,0,0,.3);
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(.4); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    .result-tag {
      margin-top: 14px;
      font-size: .92rem;
      color: rgba(255,255,255,.75);
    }

    /* Closed / No-session */
    .closed-icon  { font-size: 3.5rem; margin-bottom: 16px; }
    .closed-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .closed-desc  { font-size: .88rem; color: rgba(255,255,255,.65); line-height: 1.5; }
  </style>
</head>
<body>

<div class="app-label">🎲 번호 뽑기</div>

<div class="card">

  <!-- Loading -->
  <div class="state active" id="s-loading">
    <div class="spinner"></div>
  </div>

  <!-- Ready to draw -->
  <div class="state" id="s-draw">
    <div class="state-icon">🎯</div>
    <div class="state-title">번호 뽑기</div>
    <div class="state-desc">버튼을 눌러<br>나만의 번호를 배정받으세요</div>
    <button class="btn-draw" id="btn-draw" onclick="onDraw()">
      🎱&nbsp; 번호 뽑기
    </button>
  </div>

  <!-- Slot machine animation -->
  <div class="state" id="s-drawing">
    <div class="slot-label">뽑는 중…</div>
    <div class="slot-number" id="slot-num">?</div>
  </div>

  <!-- Result -->
  <div class="state" id="s-result">
    <div class="result-label">내 번호</div>
    <div class="result-number" id="result-num">-</div>
    <div class="result-tag">✨ 배정 완료</div>
  </div>

  <!-- Closed -->
  <div class="state" id="s-closed">
    <div class="closed-icon">🔒</div>
    <div class="closed-title">마감되었습니다</div>
    <div class="closed-desc">모든 번호가 배정되었습니다.<br>관리자에게 문의해주세요.</div>
  </div>

  <!-- No session -->
  <div class="state" id="s-nosession">
    <div class="closed-icon">⏳</div>
    <div class="closed-title">준비 중입니다</div>
    <div class="closed-desc">관리자가 세션을 시작하면<br>자동으로 진행됩니다.</div>
  </div>

</div>

<script>
  /* ─────────────────────────────────────────
     Storage helpers
  ───────────────────────────────────────── */
  const TOKEN_KEY = 'ptoken_v1';
  const DATA_KEY  = 'draw_data_v1';

  function getToken() {
    let t = localStorage.getItem(TOKEN_KEY);
    if (!t) {
      t = (typeof crypto !== 'undefined' && crypto.randomUUID)
        ? crypto.randomUUID()
        : 'tok_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem(TOKEN_KEY, t);
    }
    return t;
  }

  function loadSaved() {
    try { return JSON.parse(localStorage.getItem(DATA_KEY)); }
    catch { return null; }
  }
  function saveDraw(sessionId, number) {
    localStorage.setItem(DATA_KEY, JSON.stringify({ sessionId, number }));
  }
  function clearSaved() {
    localStorage.removeItem(DATA_KEY);
  }

  /* ─────────────────────────────────────────
     State machine
  ───────────────────────────────────────── */
  const STATES = ['loading','draw','drawing','result','closed','nosession'];

  function setState(name) {
    STATES.forEach(s => {
      const el = document.getElementById('s-' + s);
      if (el) el.classList.toggle('active', s === name);
    });
  }

  /* ─────────────────────────────────────────
     Init
  ───────────────────────────────────────── */
  async function init() {
    setState('loading');
    try {
      const res  = await fetch('/api/session-status');
      const data = await res.json();
      const sess = data.session;
      const saved = loadSaved();

      // 세션 없음
      if (!sess) {
        // 저장된 번호 있으면 계속 보여줌 (세션 종료 후에도)
        if (saved && saved.number != null) {
          showResult(saved.number, false);
        } else {
          setState('nosession');
        }
        return;
      }

      // 새 세션으로 바뀜 → 기존 데이터 삭제
      if (saved && saved.sessionId !== sess.id) {
        clearSaved();
      }

      // 이미 뽑은 번호 있으면 표시
      const fresh = loadSaved();
      if (fresh && fresh.sessionId === sess.id && fresh.number != null) {
        showResult(fresh.number, false);
        return;
      }

      setState('draw');
    } catch (e) {
      console.error(e);
      setState('nosession');
    }
  }

  /* ─────────────────────────────────────────
     Draw button handler
  ───────────────────────────────────────── */
  async function onDraw() {
    const btn = document.getElementById('btn-draw');
    btn.disabled = true;

    // 슬롯머신 시작
    setState('drawing');
    const MIN_ANIM_MS = 1600;
    const animStart   = Date.now();
    const slotEl      = document.getElementById('slot-num');

    const animTimer = setInterval(() => {
      slotEl.textContent = Math.floor(Math.random() * 999) + 1;
    }, 55);

    try {
      const token = getToken();
      const res   = await fetch('/api/draw-number', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ participant_token: token }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // 최소 애니메이션 시간 보장
      const elapsed   = Date.now() - animStart;
      const remaining = Math.max(0, MIN_ANIM_MS - elapsed);
      await new Promise(r => setTimeout(r, remaining));

      clearInterval(animTimer);

      if (data.closed) {
        setState('closed');
        return;
      }

      saveDraw(data.session_id, data.number);
      showResult(data.number, true);

    } catch (e) {
      clearInterval(animTimer);
      console.error(e);
      setState('draw');
      btn.disabled = false;
      // 간단한 오버레이 에러 표시
      alert('오류가 발생했습니다. 다시 시도해주세요.\n' + e.message);
    }
  }

  /* ─────────────────────────────────────────
     Show result
  ───────────────────────────────────────── */
  function showResult(number, withConfetti) {
    document.getElementById('result-num').textContent = number;
    setState('result');

    if (withConfetti && typeof confetti === 'function') {
      // 첫 번째 터짐
      confetti({
        particleCount: 180,
        spread: 80,
        origin: { y: 0.55 },
        colors: ['#a5b4fc', '#c084fc', '#f9a8d4', '#6ee7b7', '#fcd34d'],
      });
      // 0.4초 후 두 번째 터짐
      setTimeout(() => confetti({
        particleCount: 80,
        angle:        60,
        spread:       55,
        origin:       { x: 0, y: 0.6 },
      }), 400);
      setTimeout(() => confetti({
        particleCount: 80,
        angle:        120,
        spread:       55,
        origin:       { x: 1, y: 0.6 },
      }), 600);
    }
  }

  init();
</script>
</body>
</html>
