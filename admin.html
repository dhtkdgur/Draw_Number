<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>번호 뽑기 — 관리자</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #582B2B;
      --bg2:         #3D1A1A;
      --bg3:         #4A2323;
      --text:        #FAECB6;
      --muted:       #C9A96E;
      --a:           #F9A822;
      --b:           #E8874A;
      --accent:      #C87A40;
      --border:      #7A4040;
      --focus-ring:  #F9A822;
      --a-glow:        rgba(249,168,34,.35);
      --a-glow-0:      rgba(249,168,34,0);
      --b-glow:        rgba(232,135,74,.35);
      --bg3-glass:     rgba(74,35,35,.65);
      --border-subtle: rgba(122,64,64,.4);
      --b-subtle:      rgba(232,135,74,.12);
      --b-border:      rgba(232,135,74,.3);
      --accent-subtle: rgba(200,122,64,.12);
      --accent-border: rgba(200,122,64,.3);
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   20px;
      --radius-pill: 9999px;
      --shadow-sm:   0 2px 8px rgba(0,0,0,.25);
      --shadow-md:   0 4px 16px rgba(0,0,0,.35);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.45);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 16px 48px;
    }

    /* ── Layout ── */
    .container { max-width: 460px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--a), var(--b));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .header p {
      color: var(--muted);
      font-size: .85rem;
      margin-top: 4px;
    }

    /* ── Card ── */
    .card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Form ── */
    .form-label {
      display: block;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input[type="number"] {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 1.1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input[type="number"]:focus { border-color: var(--focus-ring); }
    input[type="number"]:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
    input[type="number"]::placeholder { color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 80ms, box-shadow 150ms;
      margin-bottom: 10px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }

    .btn-primary {
      background: linear-gradient(135deg, var(--a), var(--accent));
      color: var(--bg2);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-5px) scale(1.01);
      box-shadow: var(--shadow-md), 0 8px 24px var(--a-glow);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 9px 18px;
      width: auto;
      font-size: .8rem;
      margin-bottom: 0;
    }
    .btn-ghost:hover:not(:disabled) {
      transform: translateY(-5px) scale(1.01);
      border-color: var(--a);
      color: var(--a);
      box-shadow: var(--shadow-sm);
    }

    .btn-danger {
      background: var(--b-subtle);
      color: var(--b);
      border: 1px solid var(--b-border);
    }
    .btn-danger:hover:not(:disabled) {
      transform: translateY(-5px) scale(1.01);
      background: var(--b);
      color: var(--bg2);
      box-shadow: var(--shadow-md), 0 8px 24px var(--b-glow);
    }

    /* ── Status Badge ── */
    .badge-active {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      background: var(--accent-subtle);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-pill);
      font-size: .75rem;
      font-weight: 700;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:.3; }
    }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }
    .stat {
      background: var(--bg2);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
    }
    .stat-num {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .stat-label {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── Progress bar ── */
    .prog-track {
      background: var(--bg2);
      border-radius: var(--radius-pill);
      height: 9px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--a), var(--b));
      border-radius: var(--radius-pill);
      transition: width .6s ease;
      min-width: 0;
    }
    .prog-text {
      font-size: .75rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 20px;
    }

    /* ── QR ── */
    .qr-box {
      background: var(--bg2);
      border-radius: var(--radius-md);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .qr-frame {
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 10px;
      line-height: 0;
    }
    .qr-url-text {
      font-size: .72rem;
      color: var(--muted);
      word-break: break-all;
      text-align: center;
      line-height: 1.5;
    }

    .row { display: flex; gap: 8px; justify-content: center; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: var(--bg2);
      color: var(--text);
      padding: 11px 22px;
      border-radius: var(--radius-pill);
      font-size: .88rem;
      font-weight: 600;
      z-index: 999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .toast.show    { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent); }
    .toast.error   { border-color: var(--b); }

    /* ── Util ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🎲 번호 뽑기</h1>
    <p>관리자 화면</p>
  </div>

  <!-- Loading -->
  <div class="card" id="view-loading" style="text-align:center;padding:40px;color:var(--muted);">
    불러오는 중…
  </div>

  <!-- ── 세션 없음: 설정 화면 ── -->
  <div id="view-setup" class="hidden">
    <div class="card">
      <div class="card-title">세션 설정</div>
      <label class="form-label">총 인원 수 (1 ~ 1000)</label>
      <input type="number" id="inp-count" placeholder="예: 50" min="1" max="1000">
      <button class="btn btn-primary" id="btn-start" onclick="startSession()">
        ▶&nbsp; 세션 시작
      </button>
    </div>
  </div>

  <!-- ── 세션 활성: 현황 화면 ── -->
  <div id="view-active" class="hidden">

    <!-- 현황 카드 -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <span class="badge-active"><span class="dot"></span>세션 진행 중</span>
        <span style="font-size:.75rem;color:var(--muted);" id="session-time"></span>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-num" id="stat-drawn">0</div>
          <div class="stat-label">참가한 인원</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="stat-total">-</div>
          <div class="stat-label">총 인원</div>
        </div>
      </div>

      <div class="prog-track">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="prog-text" id="prog-text">0 / 0 명 참가</div>

      <!-- QR 섹션 -->
      <div class="qr-box">
        <div class="qr-frame">
          <img id="qr-img" width="200" height="200" alt="QR Code" style="display:block;">
        </div>
        <div class="qr-url-text" id="draw-url-text"></div>
        <div class="row">
          <button class="btn btn-ghost" onclick="copyUrl()">🔗 URL 복사</button>
        </div>
      </div>

      <div class="divider"></div>
      <button class="btn btn-danger" onclick="confirmReset()">
        🔄&nbsp; 세션 초기화 (다음 행사 준비)
      </button>
    </div>

  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let pollTimer   = null;
  let drawUrl     = '';
  let sessionData = null;

  /* ─────────────────────────────────────────
     Init
  ───────────────────────────────────────── */
  async function init() {
    await fetchStatus();
    show('view-loading', false);
  }

  /* ─────────────────────────────────────────
     Fetch session status
  ───────────────────────────────────────── */
  async function fetchStatus() {
    try {
      const res  = await fetch('/api/session-status');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      sessionData = data.session;
      if (sessionData) {
        renderActive(sessionData);
      } else {
        renderSetup();
      }
    } catch (e) {
      console.error(e);
    }
  }

  /* ─────────────────────────────────────────
     Start session
  ───────────────────────────────────────── */
  async function startSession() {
    const count = parseInt(document.getElementById('inp-count').value, 10);
    if (!count || count < 1 || count > 1000)
      return toast('인원 수를 1~1000 사이로 입력해주세요.', 'error');

    const btn = document.getElementById('btn-start');
    btn.disabled    = true;
    btn.textContent = '세션 시작 중…';

    try {
      const res  = await fetch('/api/start-session', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ total_count: count }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      toast('세션이 시작되었습니다!', 'success');
      await fetchStatus();
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = '▶  세션 시작';
    }
  }

  /* ─────────────────────────────────────────
     Reset session
  ───────────────────────────────────────── */
  async function confirmReset() {
    if (!confirm('세션을 초기화하시겠습니까?\n모든 배정 정보가 지워지며, 새 세션을 시작할 수 있습니다.'))
      return;

    try {
      const res  = await fetch('/api/reset-session', { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      clearInterval(pollTimer);
      toast('세션이 초기화되었습니다.', 'success');
      await fetchStatus();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  /* ─────────────────────────────────────────
     Copy URL
  ───────────────────────────────────────── */
  async function copyUrl() {
    try {
      await navigator.clipboard.writeText(drawUrl);
      toast('URL이 클립보드에 복사되었습니다!', 'success');
    } catch {
      toast('복사 실패 — 직접 선택해 복사해주세요.', 'error');
    }
  }

  /* ─────────────────────────────────────────
     Render helpers
  ───────────────────────────────────────── */
  function renderSetup() {
    show('view-setup', true);
    show('view-active', false);
    clearInterval(pollTimer);
  }

  function renderActive(session) {
    show('view-setup', false);
    show('view-active', true);
    updateStats(session);
    buildQR();

    // 3초 폴링
    clearInterval(pollTimer);
    pollTimer = setInterval(fetchStatus, 3000);
  }

  function updateStats(s) {
    const drawn = s.drawn_count ?? 0;
    const total = s.total_count;
    const pct   = total > 0 ? (drawn / total) * 100 : 0;

    set('stat-drawn',  drawn);
    set('stat-total',  total);
    set('prog-text',   `${drawn} / ${total} 명 참가`);
    document.getElementById('prog-fill').style.width = pct + '%';

    // 세션 시작 시각
    if (s.created_at) {
      const d = new Date(s.created_at);
      set('session-time', `${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}`);
    }
  }

  function buildQR() {
    drawUrl = window.location.origin + '/draw.html';
    set('draw-url-text', drawUrl);
    const img = document.getElementById('qr-img');
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=10&data='
              + encodeURIComponent(drawUrl);
  }

  /* ─────────────────────────────────────────
     Tiny helpers
  ───────────────────────────────────────── */
  function show(id, visible) {
    document.getElementById(id).classList.toggle('hidden', !visible);
  }
  function set(id, val) {
    document.getElementById(id).textContent = val;
  }
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3200);
  }

  init();
</script>
</body>
</html>
